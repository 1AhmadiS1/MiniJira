services:
  web:
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen(
            urllib.request.Request(
              'http://127.0.0.1:8000/health/',
              headers={'X-Forwarded-Proto': 'https'}
            ),
            timeout=5
          )
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
