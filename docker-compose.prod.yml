# Production pulls from ECR and uses RDS. Enable the local-redis profile only
# when an eligible ElastiCache endpoint is not being used.
services:
  redis:
    image: redis:7-alpine
    profiles: ["local-redis"]
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "no"
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    image: ${ECR_IMAGE:?Set ECR_IMAGE in .env.production}
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - static_data:/app/staticfiles
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  static_data:
