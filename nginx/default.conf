upstream minijira_web {
    server web:8000;
}

# Per-client burst protection. Sustained abuse is rejected with 429 while
# ordinary page loads may burst up to 20 requests without delay.
limit_req_zone $binary_remote_addr zone=minijira_per_ip:10m rate=10r/s;
limit_req_status 429;

server {
    listen 80;
    server_name 52-58-133-74.sslip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://52-58-133-74.sslip.io$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 52-58-133-74.sslip.io;
    client_max_body_size 25m;

    ssl_certificate /etc/letsencrypt/live/52-58-133-74.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/52-58-133-74.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        limit_req zone=minijira_per_ip burst=20 nodelay;
        proxy_pass http://minijira_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}
